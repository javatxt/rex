<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMX</title>
    <style>
        :root {
            --bg-warm-light: #fff3e0;
            --bg-warm-mid: #ffe0b2;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 180, 100, 0.25);
            --text-primary: #3e2a14;
            --text-secondary: #5a3e24;
            --text-muted: #7a5a3a;
            --btn-gradient-start: #f08040;
            --btn-gradient-end: #e06028;
            --btn-glow: rgba(240, 130, 60, 0.4);
            --warm-gold: #d07020;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background:
                radial-gradient(ellipse at 40% 30%, rgba(255, 200, 100, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 170, 70, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 75%, rgba(255, 220, 130, 0.3) 0%, transparent 50%),
                linear-gradient(145deg, #ffe6c9 0%, #ffdfba 25%, #fff0db 50%, #ffdfb8 75%, #ffe8cc 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 520px;
        }

        .brand-tag {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: #c0501a;
            text-shadow:
                0 0 20px rgba(220, 120, 40, 0.4),
                0 2px 6px rgba(180, 80, 20, 0.3);
            line-height: 1;
            margin-bottom: 0.3rem;
            user-select: none;
            transition: text-shadow 0.6s ease;
        }

        .brand-tag:hover {
            text-shadow:
                0 0 35px rgba(230, 140, 50, 0.55),
                0 2px 6px rgba(180, 80, 20, 0.3);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem 2.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow:
                0 10px 40px rgba(120, 60, 20, 0.15),
                0 0 0 1px rgba(255, 200, 140, 0.15) inset;
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
            width: 100%;
        }

        .card:hover {
            border-color: rgba(255, 160, 80, 0.4);
            box-shadow:
                0 14px 50px rgba(120, 60, 20, 0.2),
                0 0 0 1px rgba(255, 200, 140, 0.25) inset;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ffb040, #ff7a30, #ffb040, #ff9040, #ffb040);
            animation: avatarGlowSpin 4s linear infinite;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.6;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, #ffc060, #ff8a38, #ffc060, #ff9845, #ffc060);
            animation: avatarGlowSpin 4s linear infinite reverse;
            z-index: -1;
            filter: blur(4px);
            opacity: 0.5;
        }

        @keyframes avatarGlowSpin {
            to { transform: rotate(360deg); }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(220, 130, 60, 0.6);
            box-shadow:
                0 0 25px rgba(200, 100, 30, 0.3),
                0 0 50px rgba(200, 100, 30, 0.1);
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
            background: #e8c8a0;
        }

        .card:hover .avatar-img {
            border-color: rgba(220, 130, 60, 0.8);
            box-shadow:
                0 0 35px rgba(200, 100, 30, 0.45),
                0 0 65px rgba(200, 100, 30, 0.2);
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #d28b50, #b06030);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff5e8;
            border: 3px solid rgba(220, 130, 60, 0.6);
            box-shadow: 0 0 25px rgba(200, 100, 30, 0.3), 0 0 50px rgba(200, 100, 30, 0.1);
        }

        .name-display {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            margin-bottom: 0.3rem;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }

        .signature-tag {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            font-weight: 500;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            background: rgba(200, 120, 50, 0.1);
            border: 1px solid rgba(200, 120, 50, 0.25);
            margin-bottom: 1.4rem;
            transition: all 0.4s ease;
        }

        .card:hover .signature-tag {
            background: rgba(200, 120, 50, 0.18);
            border-color: rgba(200, 120, 50, 0.4);
            color: #5a3a1a;
        }

        .divider {
            width: 60px;
            height: 2px;
            border-radius: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 100, 40, 0.5), transparent);
            margin-bottom: 1.4rem;
        }

        .main-message {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.7;
            letter-spacing: 0.03em;
            margin-bottom: 1.8rem;
            font-weight: 500;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.7);
        }

        .main-message .highlight {
            color: #c0501a;
            font-weight: 700;
        }

        .btn-mc {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fff;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #f08040, #e06028);
            box-shadow:
                0 6px 24px rgba(200, 80, 30, 0.35),
                0 0 0 1px rgba(255, 180, 120, 0.3) inset;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-mc::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn-mc:hover {
            transform: translateY(-3px);
            box-shadow:
                0 10px 32px rgba(200, 80, 30, 0.5),
                0 0 0 1px rgba(255, 190, 130, 0.4) inset;
            background: linear-gradient(135deg, #f89050, #e87038);
        }

        .btn-mc:active {
            transform: translateY(-1px) scale(0.97);
            box-shadow:
                0 4px 16px rgba(200, 80, 30, 0.4),
                0 0 0 1px rgba(255, 170, 110, 0.35) inset;
            transition: all 0.12s ease;
        }

        .btn-mc:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn-mc .btn-icon {
            font-size: 1.25rem;
            line-height: 1;
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: rgba(120, 70, 30, 0.55);
            letter-spacing: 0.05em;
            text-align: center;
            user-select: none;
        }

        @media (max-width: 480px) {
            .brand-tag {
                font-size: 3.2rem;
                letter-spacing: 0.14em;
            }
            .card {
                padding: 2rem 1.3rem 1.8rem;
                border-radius: 20px;
            }
            .avatar-wrapper {
                width: 88px;
                height: 88px;
                margin-bottom: 1rem;
            }
            .name-display {
                font-size: 1.4rem;
            }
            .main-message {
                font-size: 0.95rem;
            }
            .btn-mc {
                padding: 0.75rem 1.7rem;
                font-size: 1rem;
            }
            .signature-tag {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .brand-tag {
                font-size: 2.6rem;
            }
            .card {
                padding: 1.5rem 1rem 1.4rem;
            }
            .avatar-wrapper {
                width: 72px;
                height: 72px;
            }
            .name-display {
                font-size: 1.2rem;
            }
            .main-message {
                font-size: 0.85rem;
            }
            .btn-mc {
                padding: 0.65rem 1.4rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="main-container">
        <div class="brand-tag">(ᗜ ˰ ᗜ) </div>
        <div class="card">
            <div class="avatar-wrapper">
                <img class="avatar-img"
                     src="https://q1.qlogo.cn/g?b=qq&nk=3643901556&s=640"
                     alt="头像"
                     loading="eager"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                     onload="this.nextElementSibling.style.display='none';">
                <div class="avatar-fallback" style="display:none;">¯꒳¯</div>
            </div>
            <div class="name-display">Ren Minxing</div>
            <div class="signature-tag">RMX · 个人标签</div>
            <div class="divider"></div>
            <p class="main-message">
                你是否想在学校玩到<span class="highlight">我的世界</span>，<br>但没人陪你玩。没事，<span class="highlight">我有一计</span>。
            </p>
            <a href="https://mcjs.cc/" target="_blank" rel="noopener noreferrer" class="btn-mc">
                <span class="btn-icon">😲</span> 网页版 MC
            </a>
        </div>
        <div class="footer-note">RMX的小站@javatnt © 2026</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            const PARTICLE_COUNT = 80;
            const CONNECTION_DIST = 95;
            const WARM_COLORS = [
                '#e07830', '#f09040', '#d06820', '#f0a048',
                '#e88838', '#f09848', '#d87830', '#f0a850',
                '#e89038', '#f0a040', '#d87028', '#e89840'
            ];

            let particles = [];
            let width, height;
            let animationId;
            let mouseX = -200;
            let mouseY = -200;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            class Particle {
                constructor() {
                    this.reset(true);
                }

                reset(initial) {
                    this.x = Math.random() * width;
                    this.y = initial ? Math.random() * height : height + Math.random() * 40 + 10;
                    this.size = Math.random() * 3.8 + 1.6;
                    this.speedY = Math.random() * 0.6 + 0.2;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.color = WARM_COLORS[Math.floor(Math.random() * WARM_COLORS.length)];
                    this.opacity = Math.random() * 0.45 + 0.3;
                    this.opacityPhase = Math.random() * Math.PI * 2;
                    this.opacitySpeed = Math.random() * 0.018 + 0.006;
                    this.wobbleAmp = Math.random() * 0.5 + 0.1;
                    this.wobbleSpeed = Math.random() * 0.025 + 0.008;
                    this.wobblePhase = Math.random() * Math.PI * 2;
                }

                update() {
                    this.y -= this.speedY;
                    this.wobblePhase += this.wobbleSpeed;
                    this.x += this.speedX + Math.sin(this.wobblePhase) * this.wobbleAmp;
                    this.opacityPhase += this.opacitySpeed;
                    const opacityMod = Math.sin(this.opacityPhase) * 0.2;
                    this.displayOpacity = Math.max(0.1, Math.min(0.75, this.opacity + opacityMod));

                    const dx = this.x - mouseX;
                    const dy = this.y - mouseY;
                    const distToMouse = Math.sqrt(dx * dx + dy * dy);
                    if (distToMouse < 130) {
                        const force = (130 - distToMouse) / 130;
                        const angle = Math.atan2(dy, dx);
                        this.x += Math.cos(angle) * force * 0.5;
                        this.y += Math.sin(angle) * force * 0.5;
                    }

                    if (this.y < -20 || this.x < -30 || this.x > width + 30) {
                        this.reset(false);
                    }
                    if (this.x < -25) this.x = width + 20;
                    if (this.x > width + 25) this.x = -20;
                }

                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.displayOpacity;
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    if (this.size > 2.6 && this.displayOpacity > 0.3) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 1.7, 0, Math.PI * 2);
                        const glowGradient = ctx.createRadialGradient(this.x, this.y, this.size * 0.3, this.x, this.y, this.size * 1.7);
                        glowGradient.addColorStop(0, this.color);
                        glowGradient.addColorStop(1, 'transparent');
                        ctx.fillStyle = glowGradient;
                        ctx.globalAlpha = this.displayOpacity * 0.25;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            function createParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONNECTION_DIST) {
                            const alpha = (1 - dist / CONNECTION_DIST) * 0.1;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = '#c06020';
                            ctx.globalAlpha = alpha;
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(ctx);
                }

                drawConnections();
                animationId = requestAnimationFrame(animate);
            }

            function handleMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }

            function handleTouchMove(e) {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }

            function handleMouseLeave() {
                mouseX = -200;
                mouseY = -200;
            }

            function init() {
                resizeCanvas();
                createParticles();
                if (animationId) cancelAnimationFrame(animationId);
                animate();
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                createParticles();
            });

            window.addEventListener('mousemove', handleMouseMove, { passive: true });
            window.addEventListener('touchmove', handleTouchMove, { passive: true });
            window.addEventListener('mouseleave', handleMouseLeave);
            window.addEventListener('blur', handleMouseLeave);

            init();
        })();
    </script>
</body>
</html>
